<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minear Family Recipes</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Libre+Franklin:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root{
  --cream:#F2EAD8;
  --cream-dark:#E8DEC6;
  --card:#FBF7EC;
  --ink:#2B2B26;
  --ink-soft:#5B5A4F;
  --rule:#B6483E;
  --rule-dark:#8F3530;
  --sage:#6F8569;
  --sage-dark:#566B51;
  --mustard:#C99A3E;
  --line:#D9CDAE;
  --shadow:rgba(43,43,38,0.18);
  --radius:10px;
}

*{box-sizing:border-box;}
body{margin:0;}
#app{
  font-family:'Libre Franklin',sans-serif;
  color:var(--ink);
  background:var(--cream);
  background-image:
    radial-gradient(circle at 1px 1px, rgba(43,43,38,0.05) 1px, transparent 0);
  background-size:14px 14px;
  min-height:100%;
  padding:0 0 60px 0;
}

.wrap{max-width:980px;margin:0 auto;padding:0 20px;}

/* ---------- Header ---------- */
.hero{
  padding:36px 20px 22px;
  text-align:center;
  border-bottom:3px solid var(--ink);
  background:var(--cream-dark);
  position:relative;
}
.hero h1{
  font-family:'Caveat',cursive;
  font-weight:700;
  font-size:56px;
  line-height:1;
  margin:0 0 4px;
  color:var(--rule-dark);
  transform:rotate(-1deg);
}
.hero p{
  margin:0;
  font-size:14px;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:var(--ink-soft);
  font-weight:600;
}

/* ---------- Tabs ---------- */
.tabs{
  display:flex;
  justify-content:center;
  gap:0;
  margin:24px auto 0;
  max-width:980px;
  padding:0 20px;
  flex-wrap:wrap;
}
.tab-btn{
  font-family:'Libre Franklin',sans-serif;
  font-weight:700;
  font-size:14px;
  letter-spacing:.03em;
  text-transform:uppercase;
  background:none;
  border:2px solid var(--ink);
  color:var(--ink);
  padding:10px 18px;
  cursor:pointer;
  margin:0 -2px 10px 0;
  position:relative;
  transition:background .15s,color .15s;
}
.tab-btn.active{background:var(--ink);color:var(--card);}
.tab-btn .count{
  display:inline-block;
  margin-left:6px;
  background:var(--rule);
  color:#fff;
  border-radius:50%;
  font-size:11px;
  width:18px;height:18px;
  line-height:18px;
  text-align:center;
}
.tab-btn.active .count{background:var(--mustard);}

/* ---------- Toolbar ---------- */
.toolbar{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
  margin:22px 0 18px;
}
.search-input{
  font-family:'Libre Franklin',sans-serif;
  font-size:15px;
  padding:10px 14px;
  border:2px solid var(--ink);
  border-radius:var(--radius);
  background:var(--card);
  flex:1 1 220px;
  min-width:160px;
  color:var(--ink);
}
.search-input:focus{outline:3px solid var(--mustard);outline-offset:1px;}
.chip{
  font-family:'Libre Franklin',sans-serif;
  font-size:12.5px;
  font-weight:600;
  border:1.5px solid var(--ink-soft);
  background:var(--card);
  color:var(--ink-soft);
  padding:6px 12px;
  border-radius:999px;
  cursor:pointer;
  white-space:nowrap;
}
.chip.active{background:var(--sage);border-color:var(--sage-dark);color:#fff;}
.chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;}
.btn{
  font-family:'Libre Franklin',sans-serif;
  font-weight:700;
  font-size:14px;
  border:2px solid var(--ink);
  background:var(--ink);
  color:var(--card);
  padding:10px 16px;
  border-radius:var(--radius);
  cursor:pointer;
}
.btn.secondary{background:var(--card);color:var(--ink);}
.btn.danger{background:var(--card);color:var(--rule-dark);border-color:var(--rule-dark);}
.btn:hover{opacity:.88;}
.btn:focus,.chip:focus,.tab-btn:focus{outline:3px solid var(--mustard);outline-offset:1px;}

/* ---------- Recipe grid / cards ---------- */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px;}
.rcard{
  background:var(--card);
  border:1.5px solid var(--line);
  border-radius:var(--radius);
  box-shadow:0 3px 0 var(--shadow);
  padding:0;
  display:flex;
  flex-direction:column;
  cursor:pointer;
  overflow:hidden;
  transition:transform .12s;
}
.rcard:hover{transform:translateY(-2px);}
.rcard-top{border-top:5px solid var(--rule);padding:16px 16px 10px;}
.rcard h3{
  font-family:'Caveat',cursive;
  font-size:28px;
  font-weight:700;
  margin:0 0 6px;
  color:var(--ink);
  line-height:1.05;
}
.rcard-meta{font-size:12px;color:var(--ink-soft);font-weight:600;margin-bottom:8px;}
.tagrow{display:flex;flex-wrap:wrap;gap:5px;padding:0 16px;}
.tag{
  font-size:10.5px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.03em;
  background:var(--cream-dark);
  color:var(--ink-soft);
  padding:3px 8px;
  border-radius:999px;
}
.tag.kid{background:var(--sage);color:#fff;}
.rcard-foot{
  margin-top:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 16px;
  border-top:1px dashed var(--line);
}
.add-btn{
  font-family:'Libre Franklin',sans-serif;
  font-size:13px;
  font-weight:700;
  background:none;
  border:1.5px solid var(--ink);
  border-radius:999px;
  padding:5px 12px;
  cursor:pointer;
}
.add-btn.added{background:var(--sage);border-color:var(--sage-dark);color:#fff;}

.empty{
  text-align:center;
  padding:50px 20px;
  color:var(--ink-soft);
  font-size:15px;
}
.empty .big{font-family:'Caveat',cursive;font-size:30px;color:var(--ink);display:block;margin-bottom:6px;}

/* ---------- Modal (recipe detail / add recipe) ---------- */
.overlay{
  position:fixed;inset:0;background:rgba(43,43,38,.55);
  display:flex;align-items:flex-start;justify-content:center;
  padding:32px 16px;overflow-y:auto;z-index:50;
}
.modal{
  background:var(--card);
  max-width:680px;width:100%;
  border-radius:var(--radius);
  border:2px solid var(--ink);
  position:relative;
  margin-bottom:32px;
}
.modal-head{border-top:7px solid var(--rule);padding:22px 26px 14px;}
.modal-head h2{font-family:'Caveat',cursive;font-size:38px;margin:0 0 4px;color:var(--ink);}
.modal-close{
  position:absolute;top:14px;right:14px;
  background:none;border:none;font-size:22px;cursor:pointer;color:var(--ink-soft);
  width:32px;height:32px;line-height:32px;text-align:center;
}
.modal-body{padding:4px 26px 26px;}
.modal-body h4{
  font-size:13px;text-transform:uppercase;letter-spacing:.05em;
  color:var(--rule-dark);margin:18px 0 8px;font-weight:800;
}
.ing-list{list-style:none;margin:0;padding:0;}
.ing-list li{
  padding:6px 0;border-bottom:1px dashed var(--line);
  font-size:14.5px;display:flex;gap:8px;
}
.ing-amt{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--ink-soft);min-width:70px;}
.steps-list{margin:0;padding-left:22px;}
.steps-list li{margin-bottom:10px;font-size:14.5px;line-height:1.5;}
.kid-note{
  background:#EFF3EA;border-left:4px solid var(--sage);
  padding:10px 14px;font-size:13.5px;border-radius:6px;margin-top:14px;
}
.modal-actions{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;}

/* ---------- Form (add recipe) ---------- */
.field{margin-bottom:14px;}
.field label{display:block;font-size:13px;font-weight:700;margin-bottom:5px;color:var(--ink-soft);}
.field input[type=text],.field input[type=number],.field textarea,.field select{
  width:100%;font-family:'Libre Franklin',sans-serif;font-size:14.5px;
  padding:9px 12px;border:1.5px solid var(--line);border-radius:7px;background:#fff;color:var(--ink);
}
.field textarea{resize:vertical;min-height:70px;}
.ing-row{display:grid;grid-template-columns:70px 70px 1fr 130px auto;gap:6px;margin-bottom:8px;}
.ing-row input,.ing-row select{padding:7px 8px;font-size:13.5px;border:1.5px solid var(--line);border-radius:6px;}

.staples-list{max-width:640px;}
.staple-row{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;margin-bottom:10px;}
.staple-row input{
  font-family:'Libre Franklin',sans-serif;font-size:14.5px;
  padding:9px 12px;border:1.5px solid var(--line);border-radius:7px;background:var(--card);color:var(--ink);
}
.staple-row input:focus{outline:2px solid var(--mustard);outline-offset:1px;}
.small-x{background:none;border:none;color:var(--rule-dark);font-size:18px;cursor:pointer;}
.checkbox-row{display:flex;align-items:center;gap:8px;}

/* ---------- This Week tab ---------- */
.week-item{
  background:var(--card);border:1.5px solid var(--line);border-radius:var(--radius);
  padding:14px 16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:14px;
  flex-wrap:wrap;
}
.week-item h4{font-family:'Caveat',cursive;font-size:24px;margin:0;color:var(--ink);}
.week-item .meta{font-size:12px;color:var(--ink-soft);font-weight:600;}
.stepper{display:flex;align-items:center;gap:8px;}
.stepper button{
  width:26px;height:26px;border:1.5px solid var(--ink);background:var(--card);border-radius:6px;
  cursor:pointer;font-weight:700;font-size:14px;line-height:1;
}
.stepper span{font-family:'JetBrains Mono',monospace;font-weight:700;min-width:18px;text-align:center;}

/* ---------- Shopping list (receipt look) ---------- */
.receipt{
  background:#fff;
  border:1.5px solid var(--line);
  box-shadow:0 4px 0 var(--shadow);
  padding:26px 26px 30px;
  border-radius:4px;
  background-image:repeating-linear-gradient(to bottom, transparent, transparent 30px, #f1ece0 31px);
}
.receipt-head{text-align:center;border-bottom:2px dashed var(--ink);padding-bottom:14px;margin-bottom:14px;}
.receipt-head h2{font-family:'Caveat',cursive;font-size:32px;margin:0;color:var(--ink);}
.receipt-head p{margin:4px 0 0;font-size:12px;color:var(--ink-soft);font-weight:600;}
.cat-block{margin-bottom:18px;}
.cat-title{
  font-size:12.5px;text-transform:uppercase;letter-spacing:.06em;font-weight:800;
  color:var(--rule-dark);border-bottom:1.5px solid var(--ink);padding-bottom:4px;margin-bottom:8px;
}
.shop-item{display:flex;align-items:baseline;gap:10px;padding:5px 0;font-size:14.5px;}
.shop-item.checked{color:var(--ink-soft);text-decoration:line-through;opacity:.55;}
.shop-item input{width:16px;height:16px;flex-shrink:0;accent-color:var(--sage-dark);cursor:pointer;}
.shop-amt{font-family:'JetBrains Mono',monospace;font-weight:700;min-width:64px;color:var(--rule-dark);}
.shop-item.checked .shop-amt{color:var(--ink-soft);}
.receipt-actions{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;justify-content:center;}

@media print{
  .hero,.tabs,.toolbar,.chip-row,.receipt-actions,.tab-btn,.modal-close{display:none !important;}
  #app{background:#fff;}
  .receipt{box-shadow:none;border:none;}
}

@media (max-width:520px){
  .hero h1{font-size:42px;}
  .ing-row{grid-template-columns:1fr 1fr;}
}
</style>
</head>

   PERSISTENCE — Firebase Firestore (live sync across devices)
   ========================================================= */
var db = firebase.firestore();
try{ db.enablePersistence({synchronizeTabs:true}); }catch(e){}
var cookbookDocRef = db.collection("cookbook").doc("state");
var applyingRemoteSnapshot = false;

function loadState(){
  cookbookDocRef.onSnapshot(function(snap){
    applyingRemoteSnapshot = true;
    if (snap.exists){
      var d = snap.data();
      state.customRecipes = d.customRecipes || [];
      state.recipeEdits = d.recipeEdits || {};
      state.hiddenIds = d.hiddenIds || [];
      state.week = d.week || [];
      state.checks = d.checks || {};
      state.staples = (d.staples && d.staples.length) ? d.staples : DEFAULT_STAPLES.slice();
    } else {
      // first time this Firestore project has ever been used — seed defaults
      state.staples = DEFAULT_STAPLES.slice();
      saveState();
    }
    state.syncStatus = snap.metadata.fromCache ? "offline" : "synced";
    applyingRemoteSnapshot = false;
    // Don't blow away an in-progress add/edit form with a remote update.
    if (!state.formState) render();
  }, function(err){
    console.error("Firestore sync error:", err);
    state.syncStatus = "error";
    render();
  });
}

async function saveState(){
  if (applyingRemoteSnapshot) return; // avoid echoing a remote update straight back
  try{
    await cookbookDocRef.set({
      customRecipes: state.customRecipes,
      recipeEdits: state.recipeEdits,
      hiddenIds: state.hiddenIds,
      week: state.week,
      checks: state.checks,
      staples: state.staples
    }, {merge:true});
  }catch(e){
    console.error("Save failed:", e);
  }
}
// All six call sites below funnel into the single saveState() write above.
function saveCustomRecipes(){ saveState(); }
function saveRecipeEdits(){ saveState(); }
function saveHiddenIds(){ saveState(); }
function saveWeek(){ saveState(); }
function saveChecks(){ saveState(); }

function escapeHtml(s){
  if (s===undefined||s===null) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

var FRACTIONS = [
  [0.125,"1/8"],[0.25,"1/4"],[0.33,"1/3"],[0.333,"1/3"],[0.34,"1/3"],
  [0.5,"1/2"],[0.66,"2/3"],[0.665,"2/3"],[0.67,"2/3"],[0.75,"3/4"]
];
function formatAmount(n){
  if (n===null||n===undefined) return "";
  var whole = Math.floor(n);
  var frac = Math.round((n-whole)*1000)/1000;
  var fracStr = "";
  if (frac>0.01){
    var best=null;
    for (var i=0;i<FRACTIONS.length;i++){
      if (Math.abs(FRACTIONS[i][0]-frac)<0.02){ best=FRACTIONS[i][1]; break; }
    }
    fracStr = best ? best : (Math.round(frac*100)/100).toString().replace(/^0\./,".");
  }
  if (whole===0 && fracStr) return fracStr;
  if (whole>0 && fracStr) return whole+" "+fracStr;
  if (whole>0) return String(whole);
  return (Math.round(n*100)/100).toString();
}

var UNIT_WORDS = ["cup","cups","tbsp","tablespoon","tablespoons","tsp","teaspoon","teaspoons",
  "oz","ounce","ounces","lb","lbs","pound","pounds","g","gram","grams","kg","kilogram","kilograms",
  "ml","milliliter","milliliters","l","liter","liters","clove","cloves","can","cans","slice","slices",
  "pinch","whole","stick","sticks","bunch","head","heads","jar","jars","package","packages","sprig","sprigs"];

var UNICODE_FRACTIONS = {"½":0.5,"⅓":0.333,"⅔":0.667,"¼":0.25,"¾":0.75,"⅛":0.125,"⅜":0.375,"⅝":0.625,"⅞":0.875};

var CATEGORY_KEYWORDS = [
  ["Meat & Seafood",["chicken","beef","pork","turkey","sausage","bacon","steak","salmon","shrimp","fish","ham","lamb","cod","tilapia","guanciale","pancetta","ribs","brisket","meat"]],
  ["Dairy & Eggs",["milk","cheese","butter","cream","yogurt","egg","parmesan","mozzarella","ricotta","cheddar","sour cream","ghee","pecorino"]],
  ["Produce",["onion","garlic","carrot","celery","broccoli","tomato","potato","lemon","lime","pepper","cilantro","parsley","basil","spinach","kale","lettuce","scallion","ginger","mushroom","avocado","cabbage","cucumber","apple","banana","herb"]],
  ["Bakery & Grains",["bread","tortilla","bun","crust","naan","baguette","croissant","roll"]],
  ["Spices & Seasonings",["salt","pepper","cumin","paprika","oregano","thyme","cinnamon","nutmeg","chili powder","curry powder","garam masala","turmeric","bay leaf","red pepper flake","spice","seasoning"]],
  ["Condiments & Sauces",["soy sauce","ketchup","mustard","mayo","hot sauce","worcestershire","vinegar","pesto","salsa","hoisin","sriracha","sauce"]],
  ["Pantry & Dry Goods",["flour","sugar","rice","pasta","oil","broth","stock","beans","lentils","cornstarch","baking powder","baking soda","yeast","oats","quinoa","noodle","spaghetti","crushed tomato","diced tomato","canned tomato","stewed tomato","tomato paste","tomato sauce"]],
  ["Frozen",["frozen"]]
];
function guessCategory(name){
  var n = (name||"").toLowerCase();
  var bestCat = null, bestLen = 0;
  for (var i=0;i<CATEGORY_KEYWORDS.length;i++){
    var cat = CATEGORY_KEYWORDS[i][0];
    var words = CATEGORY_KEYWORDS[i][1];
    for (var j=0;j<words.length;j++){
      if (n.indexOf(words[j])>-1 && words[j].length>bestLen){
        bestLen = words[j].length;
        bestCat = cat;
      }
    }
  }
  return bestCat || "Other";
}

function parseFraction(str){
  var p = str.split("/");
  return parseFloat(p[0])/parseFloat(p[1]);
}
function parseQuantity(str){
  str = str.trim();
  if (UNICODE_FRACTIONS[str]!==undefined) return UNICODE_FRACTIONS[str];
  if (/^\d+\s+\d+\/\d+$/.test(str)){
    var parts = str.split(/\s+/);
    return parseFloat(parts[0]) + parseFraction(parts[1]);
  }
  if (str.indexOf("/")>-1) return parseFraction(str);
  return parseFloat(str);
}
function parseIngredientLine(line){
  line = (line||"").trim();
  if (!line) return null;
  var original = line;
  var amount = null;
  var qtyMatch = line.match(/^(\d+\s+\d+\/\d+|\d+\/\d+|\d+\.\d+|\d+|[½⅓⅔¼¾⅛⅜⅝⅞])\s*/);
  if (qtyMatch){
    amount = parseQuantity(qtyMatch[1]);
    if (isNaN(amount)) amount = null;
    line = line.slice(qtyMatch[0].length);
  }
  var unit = null;
  var rest = line.trim();
  var unitMatch = rest.match(/^([a-zA-Z]+)\.?\s+/);
  if (unitMatch){
    var word = unitMatch[1].toLowerCase().replace(/\.$/,"");
    if (UNIT_WORDS.indexOf(word)>-1){
      unit = unitMatch[1];
      rest = rest.slice(unitMatch[0].length);
    }
  }
  var name = rest.trim().replace(/^,\s*/,"");
  if (!name) name = original;
  if (amount===null) unit = unit || "to taste";
  else if (!unit) unit = "whole";
  return {amount:amount, unit:unit, name:name, category:guessCategory(name)};
}

function normalizeInstructions(instr){
  if (!instr) return [];
  if (typeof instr === "string"){
    return instr.split(/\n+/).map(function(s){return s.trim();}).filter(Boolean);
  }
  if (Array.isArray(instr)){
    var out = [];
    instr.forEach(function(item){
      if (typeof item === "string") out.push(item.trim());
      else if (item && item["@type"]==="HowToSection" && Array.isArray(item.itemListElement)){
        item.itemListElement.forEach(function(sub){ if (sub && sub.text) out.push(String(sub.text).trim()); });
      } else if (item && item.text) out.push(String(item.text).trim());
    });
    return out.filter(Boolean);
  }
  return [];
}
function parseServings(y){
  if (!y) return null;
  var str = Array.isArray(y) ? y[0] : y;
  var m = String(str).match(/\d+/);
  return m ? parseInt(m[0],10) : null;
}
function parseIsoTime(iso){
  if (!iso) return "";
  var m = String(iso).match(/PT(?:(\d+)H)?(?:(\d+)M)?/);
  if (!m) return "";
  var h = parseInt(m[1]||0,10), min = parseInt(m[2]||0,10);
  if (!h && !min) return "";
  var parts = [];
  if (h) parts.push(h+" hr");
  if (min) parts.push(min+" min");
  return parts.join(" ");
}

function findRecipeJsonLdNode(node){
  if (!node) return null;
  if (Array.isArray(node)){
    for (var i=0;i<node.length;i++){
      var found = findRecipeJsonLdNode(node[i]);
      if (found) return found;
    }
    return null;
  }
  if (typeof node !== "object") return null;
  var type = node["@type"];
  if (type==="Recipe" || (Array.isArray(type) && type.indexOf("Recipe")>-1)) return node;
  if (node["@graph"]) return findRecipeJsonLdNode(node["@graph"]);
  return null;
}
function extractRecipeJsonLd(html){
  var doc = new DOMParser().parseFromString(html, "text/html");
  var scripts = doc.querySelectorAll('script[type="application/ld+json"]');
  for (var i=0;i<scripts.length;i++){
    try{
      var parsed = JSON.parse(scripts[i].textContent);
      var found = findRecipeJsonLdNode(parsed);
      if (found) return found;
    }catch(e){ /* malformed JSON on this site, skip it */ }
  }
  return null;
}

async function fetchPageHtml(url){
  var proxies = [
    "https://api.allorigins.win/raw?url=" + encodeURIComponent(url),
    "https://corsproxy.io/?url=" + encodeURIComponent(url)
  ];
  var lastErr = null;
  for (var i=0;i<proxies.length;i++){
    try{
      var res = await fetch(proxies[i]);
      if (res.ok){
        var text = await res.text();
        if (text && text.length>200) return text;
      }
    }catch(e){ lastErr = e; }
  }
  throw new Error("Couldn't reach that page right now.");
}

function recipeNodeToDraft(node){
  var name = (typeof node.name==="string" && node.name) ? node.name : "Imported Recipe";
  var ingredientsRaw = node.recipeIngredient || node.ingredients || [];
  var ingredients = ingredientsRaw.map(parseIngredientLine).filter(Boolean);
  var steps = normalizeInstructions(node.recipeInstructions);
  var servings = parseServings(node.recipeYield) || 4;
  var time = parseIsoTime(node.totalTime) || "";
  var tags = [];
  if (node.recipeCuisine) tags.push(String(Array.isArray(node.recipeCuisine)?node.recipeCuisine[0]:node.recipeCuisine));
  return {name:name, ingredients:ingredients, steps:steps, servings:servings, time:time, tags:tags, kidFriendly:false};
}

async function handleUrlImport(){
  var urlInput = document.getElementById("import-url-input");
  var statusEl = document.getElementById("import-status");
  var url = urlInput ? urlInput.value.trim() : "";
  if (!url){ if (statusEl) statusEl.textContent = "Paste a recipe URL first."; return; }
  if (statusEl) statusEl.textContent = "Fetching the page…";
  try{
    var html = await fetchPageHtml(url);
    var node = extractRecipeJsonLd(html);
    if (!node) throw new Error("Couldn't find recipe data on that page — try pasting the ingredients and steps below instead.");
    state.importDraft = recipeNodeToDraft(node);
    state.importMode = false;
    state.formState = {mode:"add", recipeId:null, ingRows: state.importDraft.ingredients.length || 4};
    render();
  }catch(e){
    if (statusEl) statusEl.textContent = (e && e.message) ? e.message : "Couldn't import that page automatically — try pasting it below instead.";
  }
}

function handlePasteImport(){
  var nameEl = document.getElementById("import-paste-name");
  var ingEl = document.getElementById("import-paste-ingredients");
  var stepsEl = document.getElementById("import-paste-steps");
  var name = (nameEl && nameEl.value.trim()) || "Imported Recipe";
  var ingLines = ingEl ? ingEl.value.split("\n").map(function(s){return s.trim();}).filter(Boolean) : [];
  var stepLines = stepsEl ? stepsEl.value.split("\n").map(function(s){return s.trim();}).filter(Boolean) : [];
  var ingredients = ingLines.map(parseIngredientLine).filter(Boolean);
  if (!ingredients.length && !stepLines.length){
    var statusEl = document.getElementById("import-status");
    if (statusEl) statusEl.textContent = "Paste at least some ingredients or steps first.";
    return;
  }
  state.importDraft = {name:name, ingredients:ingredients, steps:stepLines, servings:4, time:"", tags:[], kidFriendly:false};
  state.importMode = false;
  state.formState = {mode:"add", recipeId:null, ingRows: ingredients.length || 4};
  render();
}

function matchesFilters(r){

  if (state.activeTags.length){
    var ok = state.activeTags.every(function(t){ return (r.tags||[]).indexOf(t)>-1; });

    if (r.name.toLowerCase().indexOf(q)===-1) return false;
  }
  return true;
}

  var e = weekEntry(id);
  if (!e) return;
  e.batches = Math.max(1, Math.min(6, e.batches+delta));
  saveWeek();
  render();
}
function removeFromWeek(id){
  state.week = state.week.filter(function(w){ return w.id!==id; });
  saveWeek();
  render();
}
function clearWeek(){
  if (!state.week.length) return;
  state.week = [];
  saveWeek();
  render();
}

function toggleCheck(key){
  state.checks[key] = !state.checks[key];
  saveChecks();
  render();
}
function clearChecks(){
  state.checks = {};
  saveChecks();
  render();
}

/* ---- Add / edit / remove recipes ---- */
function openAddForm(){
  state.importDraft = null;
  state.formState = {mode:"add", recipeId:null, ingRows:4};
  state.modalRecipe = null;
  render();
}
function openEditForm(id){
  var r = findRecipe(id);
  if (!r) return;
  state.importDraft = null;
  state.formState = {mode:"edit", recipeId:id, ingRows:(r.ingredients||[]).length || 4};
  state.modalRecipe = null;

function ingRowHtml(ing){
  var amt = ing && ing.amount!==null && ing.amount!==undefined ? formatAmount(ing.amount) : "";
  var unit = ing ? (ing.unit==="to taste" ? "" : (ing.unit||"")) : "";
  var name = ing ? ing.name : "";
  var cat = ing ? ing.category : CATEGORY_ORDER[0];
  var catOpts = CATEGORY_ORDER.map(function(c){
    return '<option value="'+escapeHtml(c)+'"'+(c===cat?" selected":"")+'>'+escapeHtml(c)+'</option>';
  }).join('');
  return '<div class="ing-row">'+
    '<input type="text" name="iamt" placeholder="Amt" value="'+escapeHtml(amt)+'" inputmode="decimal">'+
    '<input type="text" name="iunit" placeholder="Unit" value="'+escapeHtml(unit)+'">'+
    '<input type="text" name="iname" placeholder="Ingredient name" value="'+escapeHtml(name)+'">'+
    '<select name="icat">'+catOpts+'</select>'+
    '<button type="button" class="small-x" onclick="this.closest(\'.ing-row\').remove()">✕</button>'+
    '</div>';
}

function addIngRow(){
  var c = document.getElementById("ing-rows");
  if (!c) return;
  c.insertAdjacentHTML("beforeend", ingRowHtml(null));
  c.scrollTop = c.scrollHeight;
}

function submitRecipeForm(ev){
  ev.preventDefault();
  var fs = state.formState;
  if (!fs) return;
  var f = ev.target;
  var name = f.querySelector("[name=rname]").value.trim();
  if (!name) return;
  var tagsRaw = f.querySelector("[name=rtags]").value.trim();
  var tags = tagsRaw ? tagsRaw.split(",").map(function(t){return t.trim();}).filter(Boolean) : [];
  var time = f.querySelector("[name=rtime]").value.trim() || "—";
  var servings = parseInt(f.querySelector("[name=rservings]").value,10) || 4;
  var kidFriendly = f.querySelector("[name=rkid]").checked;
  var kidNote = f.querySelector("[name=rkidnote]").value.trim();
  var stepsRaw = f.querySelector("[name=rsteps]").value.trim();
  var steps = stepsRaw ? stepsRaw.split("\n").map(function(s){return s.trim();}).filter(Boolean) : [];

  var ingredients = [];
  var rows = f.querySelectorAll(".ing-row");
  rows.forEach(function(row){
    var amt = row.querySelector("[name=iamt]").value.trim();
    var unit = row.querySelector("[name=iunit]").value.trim();
    var iname = row.querySelector("[name=iname]").value.trim();
    var cat = row.querySelector("[name=icat]").value;
    if (!iname) return;
    ingredients.push({
      amount: amt==="" ? null : parseFloat(amt),
      unit: amt==="" ? "to taste" : (unit||"whole"),
      name: iname,
      category: cat
    });
  });
  if (!ingredients.length) return;

  var id = fs.mode==="edit" ? fs.recipeId : ("custom-"+Date.now());
  var newRecipe = {id:id, name:name, tags:tags, kidFriendly:kidFriendly, time:time, servings:servings, ingredients:ingredients, steps:steps};
  if (kidNote) newRecipe.kidNote = kidNote;

  if (fs.mode==="edit"){
    if (id.indexOf("custom-")===0){
      var idx = -1;
      for (var i=0;i<state.customRecipes.length;i++){ if (state.customRecipes[i].id===id){ idx=i; break; } }
      if (idx>-1) state.customRecipes[idx] = newRecipe;
      saveCustomRecipes();
    } else {
      state.recipeEdits[id] = newRecipe;
      saveRecipeEdits();
    }
  } else {
    state.customRecipes.push(newRecipe);
    saveCustomRecipes();
  }
  state.formState = null;
  state.modalRecipe = null;
  state.importDraft = null;
  state.tab = "recipes";
  render();
}

function removeRecipeFromCookbook(id){
  if (id.indexOf("custom-")===0){
    state.customRecipes = state.customRecipes.filter(function(r){ return r.id!==id; });
    saveCustomRecipes();
  } else {
    if (state.hiddenIds.indexOf(id)===-1) state.hiddenIds.push(id);
    saveHiddenIds();
  }
  state.week = state.week.filter(function(w){ return w.id!==id; });
  saveWeek();
  state.modalRecipe = null;
  state.formState = null;
  render();
}
function restoreHidden(){
  state.hiddenIds = [];
  saveHiddenIds();
  render();
}

/* ---- Weekly staples ---- */
function addStapleRow(){
  var id = "st-"+Date.now();
  state.staples.push({id:id, name:"", note:""});
  saveStaples();
  render();
  setTimeout(function(){
    var inputs = document.querySelectorAll(".staple-row input");
    if (inputs.length>=2) inputs[inputs.length-2].focus();
  },0);
}
function updateStaple(id, field, value){
  var s = state.staples.filter(function(x){ return x.id===id; })[0];
  if (!s) return;
  s[field] = value;
  saveStaples();
}
function removeStaple(id){
  state.staples = state.staples.filter(function(s){ return s.id!==id; });
  saveStaples();
  render();
}

/* =========================================================
   SHOPPING LIST BUILD
   ========================================================= */
function buildShoppingMap(){
  var map = {};
  state.week.forEach(function(entry){
    var r = findRecipe(entry.id);
    if (!r) return;
    var mult = entry.batches||1;
    r.ingredients.forEach(function(ing){
      var key = ing.name.toLowerCase()+"|"+(ing.unit||"").toLowerCase();
      if (!map[key]) map[key] = {name:ing.name, unit:ing.unit, amount:0, category:ing.category||"Other", toTaste:false};
      if (ing.amount===null||ing.amount===undefined){ map[key].toTaste = true; }
      else { map[key].amount += ing.amount*mult; }
    });
  });
  return map;
}

/* =========================================================
   RENDER
   ========================================================= */
function render(){
  var app = document.getElementById("app");
  var html = "";
  html += renderHero();
  html += '<div class="wrap">';
  html += renderTabs();
  if (state.tab==="recipes") html += renderRecipesTab();
  if (state.tab==="week") html += renderWeekTab();
  if (state.tab==="shopping") html += renderShoppingTab();
  if (state.tab==="staples") html += renderStaplesTab();
  html += '</div>';
  if (state.formState){
    html += renderRecipeFormModal();
  } else if (state.importMode){
    html += renderImportModal();
  } else if (state.modalRecipe){
    html += renderRecipeModal(findRecipe(state.modalRecipe));
  }
  app.innerHTML = html;
  attachFormHandler();
}

function renderShoppingTab(){
  var map = buildShoppingMap();
  var keys = Object.keys(map);
  var hasStaples = state.staples.length>0;
  if (!keys.length && !hasStaples){
    return '<div class="empty"><span class="big">Your list is empty</span>Add some meals to "This Week", or add a few items in the Staples tab, and they\'ll land here organized by aisle.</div>';
  }
  var byCat = {};
  keys.forEach(function(k){
    var item = map[k];
    if (!byCat[item.category]) byCat[item.category]=[];
    byCat[item.category].push({key:k, item:item});
  });

  var totalItems = keys.length + state.staples.length;
  var html = '<div class="receipt"><div class="receipt-head"><h2>Grocery List</h2>'+
    '<p>'+state.week.length+' recipe'+(state.week.length===1?"":"s")+' &middot; '+totalItems+' items</p></div>';

  if (hasStaples){
    html += '<div class="cat-block"><div class="cat-title">Weekly Staples</div>';
    state.staples.forEach(function(s){
      var key = "staple:"+s.id;
      var checked = !!state.checks[key];
      html += '<label class="shop-item'+(checked?" checked":"")+'">'+
        '<input type="checkbox" '+(checked?"checked":"")+' onchange="toggleCheck(\''+key+'\')">'+
        '<span class="shop-amt">'+escapeHtml(s.note||"")+'</span><span>'+escapeHtml(s.name||"(unnamed item)")+'</span></label>';
    });
    html += '</div>';
  }

  CATEGORY_ORDER.forEach(function(cat){
    if (!byCat[cat]) return;
    var items = byCat[cat].sort(function(a,b){ return a.item.name.localeCompare(b.item.name); });
    html += '<div class="cat-block"><div class="cat-title">'+escapeHtml(cat)+'</div>';
    items.forEach(function(entry){
      var item = entry.item;
      var checked = !!state.checks[entry.key];
      var amtStr = item.toTaste && item.amount===0 ? (item.unit||"to taste") : formatAmount(item.amount)+" "+(item.unit||"");
      if (item.toTaste && item.amount>0) amtStr += " +";
      html += '<label class="shop-item'+(checked?" checked":"")+'">'+
        '<input type="checkbox" '+(checked?"checked":"")+' onchange="toggleCheck(\''+entry.key.replace(/'/g,"\\'")+'\')">'+
        '<span class="shop-amt">'+escapeHtml(amtStr)+'</span><span>'+escapeHtml(item.name)+'</span></label>';
    });
    html += '</div>';
  });

  html += '<div class="receipt-actions">'+
    '<button class="btn secondary" onclick="window.print()">Print list</button>'+
    '<button class="btn danger" onclick="clearChecks()">Reset checkmarks</button>'+
    '</div></div>';
  return html;
}
