<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Mise</title>

<!-- PWA manifest -->
<link rel="manifest" href="manifest.json">

<!-- iOS PWA support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mise">
<link rel="apple-touch-icon" href="icon-192.png">

<!-- Android / general -->
<meta name="theme-color" content="#0d0d12">
<meta name="mobile-web-app-capable" content="yes">
<meta name="description" content="Mise — your shared kitchen. Recipes, weekly planning, and shopping lists with friends.">

<style>
@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Libre+Franklin:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root{
  /* Mise dark palette */
  --bg:#13131a;
  --bg-deep:#0d0d12;
  --bg-card:#1c1c25;
  --bg-raised:#252532;
  --text:#e8e4da;
  --text-soft:#706e68;
  --text-muted:#38363a;
  --amber:#d4a853;
  --amber-hi:#e8c870;
  --amber-lo:#9a7838;
  --green:#4a8560;
  --green-dark:#356048;
  --red:#c04535;
  --red-dark:#7a2820;
  --border:#1e1c28;
  --border-mid:#2c2838;
  --border-strong:#3e3a52;
  --radius:10px;
  --shadow:rgba(0,0,0,0.6);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}

/* ---- Legacy variable aliases so existing JS-rendered HTML still works ---- */
:root{
  --cream:var(--bg);
  --cream-dark:var(--bg-deep);
  --card:var(--bg-card);
  --ink:var(--text);
  --ink-soft:var(--text-soft);
  --rule:var(--amber);
  --rule-dark:var(--amber-lo);
  --sage:var(--green);
  --sage-dark:var(--green-dark);
  --mustard:var(--amber-hi);
  --line:var(--border-mid);
}

/* ---- Reset ---- */
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;height:100%;}
body{overflow-x:hidden;background:var(--bg);}
button,input,select,textarea{font-family:inherit;-webkit-appearance:none;appearance:none;}
input[type=checkbox]{-webkit-appearance:checkbox;appearance:checkbox;}

/* ---- App shell ---- */
#app{
  font-family:'Libre Franklin',sans-serif;
  color:var(--text);
  background:var(--bg);
  background-image:radial-gradient(circle at 1px 1px,rgba(200,180,255,0.04) 1px,transparent 0);
  background-size:18px 18px;
  min-height:100%;
  padding:0 0 calc(70px + var(--safe-bottom)) 0;
}

.wrap{max-width:980px;margin:0 auto;padding:0 16px;}

/* ---- Hero ---- */
.hero{
  padding:calc(var(--safe-top) + 22px) 20px 18px;
  text-align:center;
  border-bottom:1px solid var(--border-mid);
  background:var(--bg-deep);
}
.hero h1{
  font-family:'Caveat',cursive;
  font-weight:700;
  font-size:clamp(40px,10vw,64px);
  line-height:1;
  margin:0 0 4px;
  color:var(--amber);
  transform:rotate(-1.5deg);
  letter-spacing:-1px;
}
.hero p{
  margin:0 0 2px;
  font-size:12px;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--text-muted);
  font-weight:700;
}

/* ---- Desktop tab bar ---- */
.tabs{
  display:flex;
  justify-content:center;
  gap:0;
  margin:18px auto 0;
  max-width:980px;
  padding:0 16px;
  flex-wrap:wrap;
}
.tab-btn{
  font-family:'Libre Franklin',sans-serif;
  font-weight:700;
  font-size:12px;
  letter-spacing:.05em;
  text-transform:uppercase;
  background:none;
  border:1.5px solid var(--border-mid);
  color:var(--text-soft);
  padding:9px 14px;
  cursor:pointer;
  margin:0 -1px 8px 0;
  transition:background .12s,color .12s,border-color .12s;
  min-height:44px;
}
.tab-btn.active{
  background:var(--amber);
  border-color:var(--amber);
  color:var(--bg-deep);
  font-weight:800;
}
.tab-btn:hover:not(.active){border-color:var(--border-strong);color:var(--text);}
.tab-btn .count{
  display:inline-block;
  margin-left:5px;
  background:var(--border-strong);
  color:var(--text-soft);
  border-radius:50%;
  font-size:10px;
  width:17px;height:17px;
  line-height:17px;
  text-align:center;
}
.tab-btn.active .count{background:var(--amber-lo);color:var(--bg-deep);}

/* ---- Mobile bottom tab bar ---- */
.tab-bar-mobile{display:none;}

/* ---- Account line ---- */
.account-line{
  text-align:center;
  font-size:11.5px;
  color:var(--text-muted);
  margin:4px 0 0;
  padding-bottom:4px;
}
.account-line a{color:var(--amber);font-weight:700;text-decoration:none;}

/* ---- Toolbar ---- */
.toolbar{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:center;
  margin:18px 0 14px;
}
.search-input{
  font-family:'Libre Franklin',sans-serif;
  font-size:16px;
  padding:10px 14px;
  border:1.5px solid var(--border-mid);
  border-radius:var(--radius);
  background:var(--bg-card);
  flex:1 1 180px;
  min-width:0;
  color:var(--text);
}
.search-input::placeholder{color:var(--text-muted);}
.search-input:focus{outline:2px solid var(--amber);outline-offset:1px;border-color:var(--amber);}

/* ---- Chips ---- */
.chip{
  font-family:'Libre Franklin',sans-serif;
  font-size:12px;
  font-weight:600;
  border:1.5px solid var(--border-mid);
  background:var(--bg-card);
  color:var(--text-soft);
  padding:7px 12px;
  border-radius:999px;
  cursor:pointer;
  white-space:nowrap;
  min-height:36px;
  transition:background .12s,color .12s,border-color .12s;
}
.chip.active{background:var(--amber);border-color:var(--amber);color:var(--bg-deep);font-weight:800;}
.chip:hover:not(.active){border-color:var(--border-strong);color:var(--text);}
.chip-row{display:flex;flex-wrap:nowrap;gap:8px;margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;}
.chip-row::-webkit-scrollbar{display:none;}

/* ---- Buttons ---- */
/* Primary — solid amber. Unmissable against dark. */
.btn{
  font-family:'Libre Franklin',sans-serif;
  font-weight:800;
  font-size:13.5px;
  letter-spacing:.01em;
  border:2px solid var(--amber);
  background:var(--amber);
  color:var(--bg-deep);
  padding:10px 18px;
  border-radius:var(--radius);
  cursor:pointer;
  min-height:44px;
  white-space:nowrap;
  transition:background .12s,border-color .12s;
}
.btn:hover{background:var(--amber-hi);border-color:var(--amber-hi);}
.btn:active{opacity:.8;}
/* Secondary — clear border, text only */
.btn.secondary{
  background:var(--bg-raised);
  color:var(--text);
  border-color:var(--border-strong);
  font-weight:700;
}
.btn.secondary:hover{border-color:var(--amber);color:var(--amber);background:var(--bg-raised);}
/* Danger — red outline */
.btn.danger{
  background:var(--bg-raised);
  color:#e05535;
  border-color:var(--red-dark);
  font-weight:700;
}
.btn.danger:hover{border-color:var(--red);color:var(--red);}
.btn:focus,.chip:focus,.tab-btn:focus{outline:2px solid var(--amber-hi);outline-offset:2px;}

/* ---- Recipe grid / cards ---- */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
.rcard{
  background:var(--bg-card);
  border:1.5px solid var(--border-mid);
  border-radius:var(--radius);
  box-shadow:0 4px 12px var(--shadow);
  display:flex;
  flex-direction:column;
  cursor:pointer;
  overflow:hidden;
  transition:transform .12s,border-color .12s;
  -webkit-user-select:none;user-select:none;
}
.rcard:hover{border-color:var(--border-strong);}
@media(hover:hover){.rcard:hover{transform:translateY(-2px);}}
.rcard:active{transform:scale(.98);}
.rcard-top{border-top:4px solid var(--amber);}
.rcard h3{
  font-family:'Caveat',cursive;
  font-size:26px;
  font-weight:700;
  margin:0 0 4px;
  color:var(--text);
  line-height:1.05;
}
.rcard-top-inner{padding:14px 14px 8px;}
.rcard-meta{font-size:11px;color:var(--text-soft);font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.03em;}
.tagrow{display:flex;flex-wrap:wrap;gap:4px;padding:0 14px;}
.tag{
  font-size:9.5px;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:.04em;
  background:var(--bg-raised);
  color:var(--text-soft);
  padding:3px 7px;
  border-radius:999px;
}
.tag.kid{background:rgba(74,133,96,0.25);color:#6aad82;}
.rcard-foot{
  margin-top:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 14px;
  border-top:1px solid var(--border);
}
.rcard-foot .label{font-size:11px;color:var(--text-muted);font-weight:600;}
.add-btn{
  font-family:'Libre Franklin',sans-serif;
  font-size:12px;
  font-weight:700;
  background:none;
  border:1.5px solid var(--border-strong);
  color:var(--text-soft);
  border-radius:999px;
  padding:5px 12px;
  cursor:pointer;
  min-height:34px;
  transition:all .12s;
}
.add-btn:hover{border-color:var(--amber);color:var(--amber);}
.add-btn.added{background:var(--green);border-color:var(--green);color:#fff;}

.empty{text-align:center;padding:50px 20px;color:var(--text-soft);font-size:15px;}
.empty .big{font-family:'Caveat',cursive;font-size:32px;color:var(--text);display:block;margin-bottom:6px;}

/* ---- Modal / bottom sheet ---- */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);
  display:flex;align-items:flex-end;justify-content:center;
  z-index:50;overflow:hidden;
}
.modal{
  background:var(--bg-card);
  width:100%;max-width:680px;
  border-radius:var(--radius) var(--radius) 0 0;
  border:1.5px solid var(--border-mid);
  border-bottom:none;
  position:relative;
  max-height:92dvh;max-height:92vh;
  display:flex;flex-direction:column;
  animation:slideUp .2s ease-out;
}
@keyframes slideUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-scroll{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;padding-bottom:calc(16px + var(--safe-bottom));}
.modal-head{
  border-top:5px solid var(--amber);
  padding:18px 20px 12px;
  background:var(--bg-deep);
}
.modal-head h2{font-family:'Caveat',cursive;font-size:34px;margin:0 0 4px;color:var(--text);}
.rcard-meta{font-size:11px;color:var(--text-soft);font-weight:600;}
.modal-close{
  position:absolute;top:12px;right:12px;
  background:var(--bg-raised);border:1px solid var(--border-mid);
  font-size:18px;cursor:pointer;color:var(--text-soft);
  width:34px;height:34px;line-height:34px;text-align:center;
  border-radius:50%;transition:border-color .12s,color .12s;
}
.modal-close:hover{border-color:var(--amber);color:var(--amber);}
.modal-body{padding:6px 20px 20px;}
.modal-body h4{
  font-size:11px;text-transform:uppercase;letter-spacing:.08em;
  color:var(--amber);margin:18px 0 8px;font-weight:800;
}
.ing-list{list-style:none;margin:0;padding:0;}
.ing-list li{
  padding:8px 0;border-bottom:1px solid var(--border);
  font-size:15px;display:flex;gap:10px;
}
.ing-list li:last-child{border-bottom:none;}
.ing-amt{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--amber-lo);min-width:70px;flex-shrink:0;font-size:13px;}
.steps-list{margin:0;padding-left:20px;}
.steps-list li{margin-bottom:12px;font-size:15px;line-height:1.6;color:var(--text);}
.steps-list li::marker{color:var(--amber);font-weight:700;}
.kid-note{
  background:rgba(74,133,96,0.12);border-left:3px solid var(--green);
  padding:10px 14px;font-size:13.5px;border-radius:6px;margin-top:14px;
  color:var(--text);
}
.modal-actions{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap;}
.modal-actions .btn{flex:1 1 auto;}

/* ---- Sharing section ---- */
.sharing-section{
  margin-top:18px;
  border-top:1px solid var(--border-mid);
  padding-top:14px;
}
.sharing-section .field label{color:var(--amber-lo);}
.sharing-section .checkbox-row label{color:var(--text);font-weight:400;}

/* ---- Form (add/edit recipe) ---- */
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px;color:var(--text-soft);}
.field input[type=text],.field input[type=number],.field textarea,.field select{
  width:100%;font-family:'Libre Franklin',sans-serif;font-size:16px;
  padding:10px 12px;border:1.5px solid var(--border-mid);border-radius:7px;
  background:var(--bg-raised);color:var(--text);min-height:44px;
  transition:border-color .12s;
}
.field input:focus,.field textarea:focus,.field select:focus{
  outline:none;border-color:var(--amber);box-shadow:0 0 0 2px rgba(212,168,83,.18);
}
.field select option{background:var(--bg-raised);color:var(--text);}
.field textarea{resize:vertical;min-height:80px;font-size:15px;}
.ing-row{display:grid;grid-template-columns:28px 64px 70px 1fr 120px auto;gap:5px;margin-bottom:8px;align-items:center;}
.ing-row input,.ing-row select{
  padding:8px 6px;font-size:14px;border:1.5px solid var(--border-mid);
  border-radius:6px;background:var(--bg-raised);color:var(--text);min-height:40px;
}
.ing-row input:focus,.ing-row select:focus{outline:none;border-color:var(--amber);}

/* Drag handle */
.drag-handle{
  cursor:grab;color:var(--text-muted);font-size:18px;
  display:flex;align-items:center;justify-content:center;
  padding:2px 4px;min-width:24px;min-height:40px;
  user-select:none;touch-action:none;
  transition:color .12s;
}
.drag-handle:active{cursor:grabbing;color:var(--amber);}
.ing-row.dragging,.step-row.dragging{opacity:.4;background:var(--bg-raised);border-radius:6px;}
.step-row{display:grid;grid-template-columns:auto 1fr auto;gap:6px;margin-bottom:8px;align-items:center;}
.step-row input{
  font-family:'Libre Franklin',sans-serif;
  font-size:14.5px;padding:9px 12px;
  border:1.5px solid var(--border-mid);border-radius:7px;
  background:var(--bg-raised);color:var(--text);width:100%;min-height:44px;
}
.step-row input:focus{outline:none;border-color:var(--amber);}
.step-row input::placeholder{color:var(--text-muted);}
.drop-placeholder{height:40px;border:2px dashed var(--amber-lo);border-radius:6px;margin-bottom:8px;opacity:.5;}

.staples-list{max-width:640px;}
.staple-row{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;margin-bottom:10px;}
.staple-row input{
  font-family:'Libre Franklin',sans-serif;font-size:16px;
  padding:10px 12px;border:1.5px solid var(--border-mid);border-radius:7px;
  background:var(--bg-card);color:var(--text);min-height:44px;
}
.staple-row input:focus{outline:none;border-color:var(--amber);}
.small-x{background:none;border:none;color:var(--red);font-size:20px;cursor:pointer;min-width:36px;min-height:36px;padding:0;opacity:.7;}
.small-x:hover{opacity:1;}
.checkbox-row{display:flex;align-items:center;gap:8px;}
.checkbox-row input[type=checkbox]{width:18px;height:18px;flex-shrink:0;accent-color:var(--amber);}

/* ---- This Week tab ---- */
.week-item{
  background:var(--bg-card);border:1.5px solid var(--border-mid);border-radius:var(--radius);
  padding:12px 14px;margin-bottom:10px;
  display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;
  transition:border-color .12s;
}
.week-item:hover{border-color:var(--border-strong);}
.week-item h4{font-family:'Caveat',cursive;font-size:22px;margin:0;color:var(--text);}
.week-item .meta{font-size:11px;color:var(--text-soft);font-weight:600;}
.stepper{display:flex;align-items:center;gap:6px;}
.stepper button{
  width:36px;height:36px;border:1.5px solid var(--border-strong);
  background:var(--bg-raised);color:var(--text);border-radius:8px;
  cursor:pointer;font-weight:700;font-size:16px;line-height:1;
  transition:border-color .12s,color .12s;
}
.stepper button:hover{border-color:var(--amber);color:var(--amber);}
.stepper span{font-family:'JetBrains Mono',monospace;font-weight:700;min-width:20px;text-align:center;}

/* ---- Shopping list ---- */
.receipt{
  background:var(--bg-card);
  border:1.5px solid var(--border-mid);
  box-shadow:0 4px 20px var(--shadow);
  padding:22px 18px 26px;
  border-radius:var(--radius);
}
.receipt-head{text-align:center;border-bottom:1px solid var(--border-mid);padding-bottom:14px;margin-bottom:14px;}
.receipt-head h2{font-family:'Caveat',cursive;font-size:32px;margin:0;color:var(--amber);}
.receipt-head p{margin:4px 0 0;font-size:12px;color:var(--text-soft);font-weight:600;}
.cat-block{margin-bottom:18px;}
.cat-title{
  font-size:11px;text-transform:uppercase;letter-spacing:.08em;font-weight:800;
  color:var(--amber);padding-bottom:6px;margin-bottom:6px;
  border-bottom:1px solid var(--border-mid);
}
.shop-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 0;font-size:15px;
  border-bottom:1px solid var(--border);
  min-height:44px;color:var(--text);
}
.shop-item:last-child{border-bottom:none;}
.shop-item.checked{color:var(--text-muted);text-decoration:line-through;}
.shop-item input[type=checkbox]{
  width:20px;height:20px;flex-shrink:0;
  accent-color:var(--amber);cursor:pointer;
}
.shop-amt{font-family:'JetBrains Mono',monospace;font-weight:700;min-width:64px;color:var(--amber-lo);font-size:13px;}
.shop-item.checked .shop-amt{color:var(--text-muted);}
.receipt-actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;justify-content:center;}

/* ---- Auth gate ---- */
.auth-wrap{max-width:400px;margin:0 auto;padding:24px 16px;}

/* ---- Migration banner ---- */
.migration-banner{
  background:rgba(212,168,83,.1);
  border:1.5px solid var(--amber-lo);
  border-radius:var(--radius);
  padding:14px 16px;margin-bottom:18px;
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}

/* ---- Print ---- */
@media print{
  .hero,.tabs,.tab-bar-mobile,.toolbar,.chip-row,.receipt-actions,.tab-btn,.modal-close{display:none !important;}
  #app{background:#fff;color:#000;padding-bottom:0;}
  .receipt{box-shadow:none;border:none;background:#fff;}
  .receipt-head h2,.cat-title,.shop-amt{color:#000;}
}

/* ============================================================
   MOBILE RESPONSIVE (≤ 640px)
   ============================================================ */
@media (max-width:640px){

  .tabs{display:none;}
  .tab-bar-mobile{
    display:flex;
    position:fixed;
    bottom:0;left:0;right:0;
    background:var(--bg-deep);
    border-top:1px solid var(--border-mid);
    padding-bottom:var(--safe-bottom);
    z-index:40;
  }
  .tab-bar-mobile button{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    background:none;border:none;cursor:pointer;padding:8px 4px;
    font-family:'Libre Franklin',sans-serif;font-size:9px;font-weight:800;
    text-transform:uppercase;letter-spacing:.03em;color:var(--text-muted);
    min-height:56px;position:relative;transition:color .12s;
  }
  .tab-bar-mobile button.active{color:var(--amber);}
  .tab-bar-mobile button.active::after{
    content:'';position:absolute;top:0;left:0;right:0;
    height:2px;background:var(--amber);
  }
  .tab-bar-mobile .tab-icon{font-size:20px;line-height:1;}
  .tab-bar-mobile .tab-badge{
    position:absolute;top:5px;right:calc(50% - 20px);
    background:var(--amber);color:var(--bg-deep);
    border-radius:999px;font-size:9px;font-weight:800;
    min-width:16px;height:16px;line-height:16px;
    text-align:center;padding:0 3px;
  }
  .tab-bar-mobile button.active .tab-badge{background:var(--amber-hi);}

  .hero{padding:calc(var(--safe-top) + 10px) 16px 10px;}
  .hero p{font-size:10px;}
  .account-line{font-size:10.5px;}

  .toolbar{flex-direction:column;align-items:stretch;gap:8px;margin:14px 0 10px;}
  .toolbar .btn{width:100%;text-align:center;}
  .toolbar .search-input{width:100%;}

  .chip-row{flex-wrap:nowrap;}
  .grid{grid-template-columns:1fr;gap:12px;}

  .overlay{align-items:flex-end;}
  .modal{
    border-radius:20px 20px 0 0;
    max-height:96dvh;max-height:96vh;
    border-left:1.5px solid var(--border-mid);
    border-right:1.5px solid var(--border-mid);
  }
  .modal-head::before{
    content:'';display:block;width:36px;height:4px;
    background:var(--border-strong);border-radius:99px;margin:0 auto 12px;
  }
  .modal-head{padding:10px 16px 8px;}

  activeTags:[],

  hiddenIds:[],       // starter recipe ids removed by this account

  week:[],            // [{id, batches}]
  checks:{},          // key -> bool
  modalRecipe:null,   // id of recipe being viewed, or null

  authError:"",

  publicRecipes:[],        // recipes anyone has marked public, across all accounts
  showMigrationBanner:false,

  sharedRecipeView:null,   // a recipe opened via a ?recipe= share link, before/without saving a copy
  pendingSharedRecipeId:null,
  starterShares:{}         // starter recipe id -> Firestore doc id of this account's shareable clone of it
};

function mergedStarter(base){
  if (state.hiddenIds.indexOf(base.id)>-1) return null;
  if (state.recipeEdits[base.id]) return state.recipeEdits[base.id];
  return base;
}
function allRecipes(){
  var starters = STARTER_RECIPES.map(mergedStarter).filter(function(r){ return !!r; });
  return starters.concat(state.myRecipes);
}
function findRecipe(id){
  var all = allRecipes();
  for (var i=0;i<all.length;i++){ if (all[i].id===id) return all[i]; }
  var pub = state.publicRecipes.filter(function(r){ return r.id===id; })[0];
  if (pub) return pub;
  if (state.sharedRecipeView && state.sharedRecipeView.id===id) return state.sharedRecipeView;
  return null;
}
function isOwnedRecipe(id){
  return state.myRecipes.some(function(r){ return r.id===id; });
}

/* =========================================================
   PERSISTENCE — Firebase Auth (accounts) + Firestore (live sync)
   ========================================================= */
var auth = firebase.auth();
var db = firebase.firestore();
try{ db.enablePersistence({synchronizeTabs:true}); }catch(e){}

var activeUnsubscribers = [];
function clearListeners(){
  activeUnsubscribers.forEach(function(u){ try{ u(); }catch(e){} });
  activeUnsubscribers = [];
}

function loadState(){
  auth.onAuthStateChanged(function(user){
    clearListeners();
    if (!user){
      state.currentUser = null;
      render();
      return;
    }
    state.currentUser = {uid:user.uid, email:user.email, displayName:user.displayName || user.email};
    state.authError = "";
    attachUserListeners(user.uid);
    checkMigrationBanner(user.uid);
    checkSharedRecipeLink();
  }, function(err){
    console.error("Auth error:", err);
    state.authError = err.message;
    render();
  });
}

function attachUserListeners(uid){
  var stateRef = db.collection("users").doc(uid).collection("private").doc("state");
  var stapleLoaded = false;
  var unsubState = stateRef.onSnapshot(function(snap){
    if (snap.exists){
      var d = snap.data();
      state.recipeEdits = d.recipeEdits || {};
      state.hiddenIds = d.hiddenIds || [];
      state.week = d.week || [];
      state.checks = d.checks || {};
      state.starterShares = d.starterShares || {};
      state.staples = (d.staples && d.staples.length) ? d.staples : DEFAULT_STAPLES.slice();
      stapleLoaded = true;
    } else if (!stapleLoaded){
      state.staples = DEFAULT_STAPLES.slice();
      savePrivateState();
      stapleLoaded = true;
    }
    state.syncStatus = snap.metadata.fromCache ? "offline" : "synced";
    if (!state.formState) render();
  }, function(err){
    console.error("Private state sync error:", err);
    state.syncStatus = "error";
    render();
  });
  activeUnsubscribers.push(unsubState);

  var unsubMine = db.collection("recipes").where("ownerId","==",uid).onSnapshot(function(qs){
    var list = [];
    qs.forEach(function(doc){ list.push(Object.assign({id:doc.id}, doc.data())); });
    state.myRecipes = list;
    if (!state.formState) render();
  }, function(err){ console.error("My recipes sync error:", err); });
  activeUnsubscribers.push(unsubMine);

  var unsubPublic = db.collection("recipes").where("isPublic","==",true).onSnapshot(function(qs){
    var list = [];
    qs.forEach(function(doc){ list.push(Object.assign({id:doc.id}, doc.data())); });
    state.publicRecipes = list;
    if (!state.formState) render();
  }, function(err){ console.error("Public recipes sync error:", err); });
  activeUnsubscribers.push(unsubPublic);
}

async function ensureStarterShareDoc(starterId){

  if (existingId && state.myRecipes.some(function(r){ return r.id===existingId; })){

  }

  var doc = {

/* =========================================================
   HELPERS
   ========================================================= */
function escapeHtml(s){
  if (s===undefined||s===null) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

var FRACTIONS = [
  [0.125,"1/8"],[0.25,"1/4"],[0.33,"1/3"],[0.333,"1/3"],[0.34,"1/3"],
  [0.5,"1/2"],[0.66,"2/3"],[0.665,"2/3"],[0.67,"2/3"],[0.75,"3/4"]
];
function formatAmount(n){
  if (n===null||n===undefined) return "";
  var whole = Math.floor(n);
  var frac = Math.round((n-whole)*1000)/1000;
  var fracStr = "";
  if (frac>0.01){
    var best=null;
    for (var i=0;i<FRACTIONS.length;i++){
      if (Math.abs(FRACTIONS[i][0]-frac)<0.02){ best=FRACTIONS[i][1]; break; }
    }
    fracStr = best ? best : (Math.round(frac*100)/100).toString().replace(/^0\./,".");
  }
  if (whole===0 && fracStr) return fracStr;
  if (whole>0 && fracStr) return whole+" "+fracStr;
  if (whole>0) return String(whole);
  return (Math.round(n*100)/100).toString();
}

/* =========================================================
   RECIPE IMPORT — parse a recipe from a URL or pasted text
   ========================================================= */
var UNIT_WORDS = ["cup","cups","tbsp","tablespoon","tablespoons","tsp","teaspoon","teaspoons",
  "oz","ounce","ounces","lb","lbs","pound","pounds",
  "clove","cloves","can","cans","slice","slices",
  "pinch","whole","stick","sticks","bunch","head","heads","jar","jars","package","packages","sprig","sprigs",
  "large","medium","small","sheet","sheets"];
var METRIC_WEIGHT_UNITS = ["g","gram","grams","kg","kilogram","kilograms"];
var METRIC_VOLUME_UNITS = ["ml","milliliter","milliliters","l","liter","liters"];
var ALL_UNIT_WORDS = UNIT_WORDS.concat(METRIC_WEIGHT_UNITS, METRIC_VOLUME_UNITS);
var UNIT_REGEX = new RegExp("^(" + ALL_UNIT_WORDS.slice().sort(function(a,b){return b.length-a.length;}).join("|") + ")\\.?(?=\\s|$)", "i");

var UNICODE_FRACTIONS = {"½":0.5,"⅓":0.333,"⅔":0.667,"¼":0.25,"¾":0.75,"⅛":0.125,"⅜":0.375,"⅝":0.625,"⅞":0.875};
var QTY_PATTERN = "(\\d+\\s*[-–]\\s*\\d+|\\d+[½⅓⅔¼¾⅛⅜⅝⅞]|\\d+\\s+\\d+\\/\\d+|\\d+\\/\\d+|\\d+\\.\\d+|\\d+|[½⅓⅔¼¾⅛⅜⅝⅞])";

var CATEGORY_KEYWORDS = [
  ["Meat & Seafood",["chicken","beef","pork","turkey","sausage","bacon","steak","salmon","shrimp","fish","ham","lamb","cod","tilapia","guanciale","pancetta","ribs","brisket","meat"]],
  ["Dairy & Eggs",["milk","cheese","butter","cream","yogurt","egg","parmesan","mozzarella","ricotta","cheddar","sour cream","ghee","pecorino"]],
  ["Produce",["onion","garlic","carrot","celery","broccoli","tomato","potato","lemon","lime","pepper","cilantro","parsley","basil","spinach","kale","lettuce","scallion","ginger","mushroom","avocado","cabbage","cucumber","apple","banana","herb"]],
  ["Bakery & Grains",["bread","tortilla","bun","crust","naan","baguette","croissant","roll","graham cracker"]],
  ["Spices & Seasonings",["salt","pepper","cumin","paprika","oregano","thyme","cinnamon","nutmeg","chili powder","curry powder","garam masala","turmeric","bay leaf","red pepper flake","spice","seasoning","vanilla extract"]],
  ["Condiments & Sauces",["soy sauce","ketchup","mustard","mayo","hot sauce","worcestershire","vinegar","pesto","salsa","hoisin","sriracha","sauce"]],
  ["Pantry & Dry Goods",["flour","sugar","rice","pasta","oil","broth","stock","beans","lentils","cornstarch","baking powder","baking soda","yeast","oats","quinoa","noodle","spaghetti","crushed tomato","diced tomato","canned tomato","stewed tomato","tomato paste","tomato sauce","milk powder","condensed milk","powdered sugar"]],
  ["Frozen",["frozen"]]
];
function guessCategory(name){
  var n = (name||"").toLowerCase();
  var bestCat = null, bestLen = 0;
  for (var i=0;i<CATEGORY_KEYWORDS.length;i++){
    var cat = CATEGORY_KEYWORDS[i][0];
    var words = CATEGORY_KEYWORDS[i][1];
    for (var j=0;j<words.length;j++){
      if (n.indexOf(words[j])>-1 && words[j].length>bestLen){
        bestLen = words[j].length;
        bestCat = cat;
      }
    }
  }
  return bestCat || "Other";
}

function unitScore(u){
  if (!u) return 0;
  var w = u.toLowerCase().replace(/\.$/,"");
  if (METRIC_WEIGHT_UNITS.indexOf(w)>-1 || METRIC_VOLUME_UNITS.indexOf(w)>-1) return 1; // metric: usable, but less kitchen-friendly for most US cooks
  if (UNIT_WORDS.indexOf(w)>-1) return 2; // cups/tbsp/lb/etc: prefer these when available
  return 0;
}
function parseFraction(str){
  var p = str.split("/");
  return parseFloat(p[0])/parseFloat(p[1]);
}
function parseQuantity(str){
  str = str.trim();
  if (UNICODE_FRACTIONS[str]!==undefined) return UNICODE_FRACTIONS[str];
  var rangeMatch = str.match(/^(\d+)\s*[-–]\s*(\d+)$/);
  if (rangeMatch) return parseFloat(rangeMatch[1]); // a range like "5-6" -> use the low end
  var glued = str.match(/^(\d+)([½⅓⅔¼¾⅛⅜⅝⅞])$/);
  if (glued) return parseFloat(glued[1]) + UNICODE_FRACTIONS[glued[2]]; // glued mixed number, e.g. "2½"
  if (/^\d+\s+\d+\/\d+$/.test(str)){
    var parts = str.split(/\s+/);
    return parseFloat(parts[0]) + parseFraction(parts[1]);
  }
  if (str.indexOf("/")>-1) return parseFraction(str);
  return parseFloat(str);
}
// Finds a quantity (+ optional recognized unit) at the very start of `text`.
// Returns {amount, unit, end} where `end` is how many characters were consumed,
// or null if no quantity was found there.
function extractMeasure(text){
  var qm = text.match(new RegExp("^"+QTY_PATTERN));
  if (!qm) return null;
  var amount = parseQuantity(qm[1]);
  if (isNaN(amount)) return null;
  var consumed = qm[0].length;
  var rest = text.slice(consumed);
  var spaceMatch = rest.match(/^\s*/)[0];
  var afterSpace = rest.slice(spaceMatch.length);
  var unit = null, unitLen = 0;
  var um = afterSpace.match(UNIT_REGEX);
  if (um){ unit = um[1]; unitLen = spaceMatch.length + um[0].length; }
  return {amount:amount, unit:unit, end: consumed+unitLen};
}
// Parses one ingredient line into {amount, unit, name, category}. Handles the
// common "metric (imperial)" or "metric / imperial" dual-measurement style some
// sites use (e.g. "230g (2½ cups) flour" or "396 g / 14 oz can milk") by picking
// whichever measurement is more kitchen-usable and stripping the rest from the name.
function parseIngredientLine(line){
  line = (line||"").trim();
  if (!line) return null;
  var original = line;
  var removeSpans = [];
  var candidates = [];

  var lead = extractMeasure(line);
  if (lead){
    candidates.push({amount:lead.amount, unit:lead.unit, score:unitScore(lead.unit)});
    removeSpans.push([0, lead.end]);
  }

  var parenRe = /\(([^)]*)\)/g, pm;
  while ((pm = parenRe.exec(line))){
    var inner = extractMeasure(pm[1]);
    if (inner){
      candidates.push({amount:inner.amount, unit:inner.unit, score:unitScore(inner.unit)+0.5});
      removeSpans.push([pm.index, pm.index+pm[0].length]);
    }
  }

  var slashIdx = line.indexOf("/");
  if (slashIdx>-1 && !(lead && slashIdx<lead.end)){
    var afterSlash = line.slice(slashIdx+1);
    var leadSpace = afterSlash.match(/^\s*/)[0];
    var sm = extractMeasure(afterSlash.slice(leadSpace.length));
    if (sm){
      candidates.push({amount:sm.amount, unit:sm.unit, score:unitScore(sm.unit)+0.5});
      removeSpans.push([slashIdx, slashIdx+1+leadSpace.length+sm.end]);
    }
  }

  var best = null;
  candidates.forEach(function(c){ if (!best || c.score>best.score) best = c; });

  removeSpans.sort(function(a,b){ return a[0]-b[0]; });
  var name = "", cursor = 0;
  removeSpans.forEach(function(span){
    if (span[0]>cursor) name += line.slice(cursor, span[0]);
    cursor = Math.max(cursor, span[1]);
  });
  name += line.slice(cursor);
  name = name.replace(/\s+/g," ").replace(/^[,\-\/\s]+|[,\-\/\s]+$/g,"").trim();
  if (!name) name = original;

  var amount = best ? best.amount : null;
  var unit = best ? best.unit : null;
  if (amount===null) unit = unit || "to taste";
  else if (!unit) unit = "whole";
  return {amount:amount, unit:unit, name:name, category:guessCategory(name)};
}
// Recognizes section-divider lines some sites mix into an ingredient list
// (e.g. "GRAHAM CRACKER CRUST") so they don't get added as a fake ingredient.
function looksLikeSectionHeader(line){
  var t = (line||"").trim();
  if (!t || /\d/.test(t)) return false;
  return t.length<50 && t===t.toUpperCase() && /[A-Z]/.test(t);
}
function stripStepNumbering(s){
  return s.replace(/^\s*(?:step\s*)?\d+\s*[\.\):]\s*/i, "").trim();
}

function normalizeInstructions(instr){
  if (!instr) return [];
  if (typeof instr === "string"){
    return instr.split(/\n+/).map(function(s){return stripStepNumbering(s.trim());}).filter(Boolean);
  }
  if (Array.isArray(instr)){
    var out = [];
    instr.forEach(function(item){
      if (typeof item === "string") out.push(stripStepNumbering(item.trim()));
      else if (item && item["@type"]==="HowToSection" && Array.isArray(item.itemListElement)){
        item.itemListElement.forEach(function(sub){ if (sub && sub.text) out.push(stripStepNumbering(String(sub.text).trim())); });
      } else if (item && item.text) out.push(stripStepNumbering(String(item.text).trim()));
    });
    return out.filter(Boolean);
  }
  return [];
}
function parseServings(y){
  if (!y) return null;
  var str = Array.isArray(y) ? y.join(" ") : String(y);
  var prefMatch = str.match(/(\d+)\s*(?:slices?|servings?|portions?)/i);
  if (prefMatch) return parseInt(prefMatch[1],10);
  var m = str.match(/\d+/);
  return m ? parseInt(m[0],10) : null;
}
function parseIsoTime(iso){
  if (!iso) return "";
  var m = String(iso).match(/PT(?:(\d+)H)?(?:(\d+)M)?/);
  if (!m) return "";
  var h = parseInt(m[1]||0,10), min = parseInt(m[2]||0,10);
  if (!h && !min) return "";
  var parts = [];
  if (h) parts.push(h+" hr");
  if (min) parts.push(min+" min");
  return parts.join(" ");
}

function findRecipeJsonLdNode(node){
  if (!node) return null;
  if (Array.isArray(node)){
    for (var i=0;i<node.length;i++){
      var found = findRecipeJsonLdNode(node[i]);
      if (found) return found;
    }
    return null;
  }
  if (typeof node !== "object") return null;
  var type = node["@type"];
  if (type==="Recipe" || (Array.isArray(type) && type.indexOf("Recipe")>-1)) return node;
  if (node["@graph"]) return findRecipeJsonLdNode(node["@graph"]);
  return null;
}
function extractRecipeJsonLd(html){
  var doc = new DOMParser().parseFromString(html, "text/html");
  var scripts = doc.querySelectorAll('script[type="application/ld+json"]');
  for (var i=0;i<scripts.length;i++){
    try{
      var parsed = JSON.parse(scripts[i].textContent);
      var found = findRecipeJsonLdNode(parsed);
      if (found) return found;
    }catch(e){ /* malformed JSON on this site, skip it */ }
  }
  return null;
}

async function fetchPageHtml(url){
  var proxies = [
    "https://api.allorigins.win/raw?url=" + encodeURIComponent(url),
    "https://corsproxy.io/?url=" + encodeURIComponent(url)
  ];
  var lastErr = null;
  for (var i=0;i<proxies.length;i++){
    try{
      var res = await fetch(proxies[i]);
      if (res.ok){
        var text = await res.text();
        if (text && text.length>200) return text;
      }
    }catch(e){ lastErr = e; }
  }
  throw new Error("Couldn't reach that page right now.");
}

function recipeNodeToDraft(node){
  var name = (typeof node.name==="string" && node.name) ? node.name : "Imported Recipe";
  var ingredientsRaw = node.recipeIngredient || node.ingredients || [];
  var ingredients = ingredientsRaw.filter(function(l){ return !looksLikeSectionHeader(l); }).map(parseIngredientLine).filter(Boolean);
  var steps = normalizeInstructions(node.recipeInstructions);
  var servings = parseServings(node.recipeYield) || 4;
  var time = parseIsoTime(node.totalTime) || "";
  var tags = [];
  if (node.recipeCuisine) tags.push(String(Array.isArray(node.recipeCuisine)?node.recipeCuisine[0]:node.recipeCuisine));
  return {name:name, ingredients:ingredients, steps:steps, servings:servings, time:time, tags:tags, kidFriendly:false};
}

async function handleUrlImport(){
  var urlInput = document.getElementById("import-url-input");
  var statusEl = document.getElementById("import-status");
  var url = urlInput ? urlInput.value.trim() : "";
  if (!url){ if (statusEl) statusEl.textContent = "Paste a recipe URL first."; return; }
  if (statusEl) statusEl.textContent = "Fetching the page…";
  try{
    var html = await fetchPageHtml(url);
    var node = extractRecipeJsonLd(html);
    if (!node) throw new Error("Couldn't find recipe data on that page — try pasting the ingredients and steps below instead.");
    state.importDraft = recipeNodeToDraft(node);
    state.importMode = false;
    state.formState = {mode:"add", recipeId:null, ingRows: state.importDraft.ingredients.length || 4};
    render();
  }catch(e){
    if (statusEl) statusEl.textContent = (e && e.message) ? e.message : "Couldn't import that page automatically — try pasting it below instead.";
  }
}

function handlePasteImport(){
  var nameEl = document.getElementById("import-paste-name");
  var ingEl = document.getElementById("import-paste-ingredients");
  var stepsEl = document.getElementById("import-paste-steps");
  var name = (nameEl && nameEl.value.trim()) || "Imported Recipe";
  var ingLines = ingEl ? ingEl.value.split("\n").map(function(s){return s.trim();}).filter(Boolean) : [];
  var stepLines = stepsEl ? stepsEl.value.split("\n").map(function(s){return s.trim();}).filter(Boolean) : [];
  var ingredients = ingLines.filter(function(l){ return !looksLikeSectionHeader(l); }).map(parseIngredientLine).filter(Boolean);
  if (!ingredients.length && !stepLines.length){
    var statusEl = document.getElementById("import-status");
    if (statusEl) statusEl.textContent = "Paste at least some ingredients or steps first.";
    return;
  }
  state.importDraft = {name:name, ingredients:ingredients, steps:stepLines, servings:4, time:"", tags:[], kidFriendly:false};
  state.importMode = false;
  state.formState = {mode:"add", recipeId:null, ingRows: ingredients.length || 4};
  render();
}

function openImportModal(){
  state.importMode = true;
  state.modalRecipe = null;
  state.formState = null;
  render();
}
function closeImportModal(){
  state.importMode = false;
  render();
}

function allTags(){
  var set = {};
  allRecipes().forEach(function(r){ (r.tags||[]).forEach(function(t){ set[t]=true; }); });
  return Object.keys(set).sort();
}

function matchesFilters(r){
  if (state.kidOnly && !r.kidFriendly) return false;
  if (state.activeTags.length){
    var ok = state.activeTags.every(function(t){ return (r.tags||[]).indexOf(t)>-1; });
    if (!ok) return false;
  }
  if (state.search.trim()){
    var q = state.search.trim().toLowerCase();
    if (r.name.toLowerCase().indexOf(q)===-1) return false;
  }
  return true;
}

function inWeek(id){ return state.week.some(function(w){ return w.id===id; }); }
function weekEntry(id){ return state.week.find(function(w){ return w.id===id; }); }

/* =========================================================
   ACTIONS
   ========================================================= */
function setTab(t){ state.tab=t; render(); }
function setSearch(v){ state.search=v; refreshRecipeListArea(); }
function toggleTagFilter(t){
  var i = state.activeTags.indexOf(t);
  if (i>-1) state.activeTags.splice(i,1); else state.activeTags.push(t);
  refreshRecipeListArea();
}
function toggleKidOnly(){ state.kidOnly = !state.kidOnly; refreshRecipeListArea(); }
function refreshRecipeListArea(){
  var el = document.getElementById("recipe-list-area");
  if (el) el.innerHTML = renderRecipeListArea();
}

function openRecipe(id){ state.modalRecipe = id; state.formState = null; state.importMode = false; render(); }
function closeModal(){
  state.modalRecipe = null; state.formState = null; state.importMode = false; state.importDraft = null;
  if (state.sharedRecipeView){
    state.sharedRecipeView = null; state.pendingSharedRecipeId = null;
    try{
      var url = new URL(window.location.href);
      url.searchParams.delete("recipe");
      window.history.replaceState({}, "", url.toString());
    }catch(e){}
  }
  render();
}

function toggleWeek(id){
  if (inWeek(id)){
    state.week = state.week.filter(function(w){ return w.id!==id; });
  } else {
    state.week.push({id:id, batches:1});
  }
  saveWeek();
  render();
}
function changeBatches(id, delta){
  var e = weekEntry(id);
  if (!e) return;
  e.batches = Math.max(1, Math.min(6, e.batches+delta));
  saveWeek();
  render();
}
function removeFromWeek(id){
  state.week = state.week.filter(function(w){ return w.id!==id; });
  saveWeek();
  render();
}
function clearWeek(){
  if (!state.week.length) return;
  state.week = [];
  saveWeek();
  render();
}

function toggleCheck(key){
  state.checks[key] = !state.checks[key];
  saveChecks();
  render();
}
function clearChecks(){
  state.checks = {};
  saveChecks();
  render();
}

async function submitRecipeForm(ev){
  ev.preventDefault();
  var fs = state.formState;
  if (!fs || !state.currentUser) return;
  var f = ev.target;
  var name = f.querySelector("[name=rname]").value.trim();
  if (!name) return;
  var tagsRaw = f.querySelector("[name=rtags]").value.trim();
  var tags = tagsRaw ? tagsRaw.split(",").map(function(t){return t.trim();}).filter(Boolean) : [];
  var time = f.querySelector("[name=rtime]").value.trim() || "—";
  var servings = parseInt(f.querySelector("[name=rservings]").value,10) || 4;
  var kidFriendly = f.querySelector("[name=rkid]").checked;
  var kidNote = f.querySelector("[name=rkidnote]").value.trim();
  var stepsRaw = f.querySelector("[name=rsteps]");
  var steps = stepsRaw
    ? stepsRaw.value.trim().split("\n").map(function(s){return s.trim();}).filter(Boolean)
    : Array.from(f.querySelectorAll("[name=step-text]")).map(function(i){return i.value.trim();}).filter(Boolean);

  var ingredients = [];
  var rows = f.querySelectorAll(".ing-row");
  rows.forEach(function(row){
    var amt = row.querySelector("[name=iamt]").value.trim();
    var unit = row.querySelector("[name=iunit]").value.trim();
    var iname = row.querySelector("[name=iname]").value.trim();
    var cat = row.querySelector("[name=icat]").value;
    if (!iname) return;
    ingredients.push({
      amount: amt==="" ? null : parseFloat(amt),
      unit: amt==="" ? "to taste" : (unit||"whole"),
      name: iname,
      category: cat
    });
  });
  if (!ingredients.length) return;

  if (fs.mode==="edit" && isOwnedRecipe(fs.recipeId)){
    // editing one of THIS account's own Firestore-backed recipes
    try{
      await db.collection("recipes").doc(fs.recipeId).update({
        name:name, tags:tags, kidFriendly:kidFriendly, kidNote:kidNote||"",
        time:time, servings:servings, ingredients:ingredients, steps:steps
      });
    }catch(e){ console.error("Couldn't save recipe:", e); }
  } else if (fs.mode==="edit"){
    // editing a built-in starter recipe -> personal override, same as before
    var newRecipe = {id:fs.recipeId, name:name, tags:tags, kidFriendly:kidFriendly, time:time, servings:servings, ingredients:ingredients, steps:steps};
    if (kidNote) newRecipe.kidNote = kidNote;
    state.recipeEdits[fs.recipeId] = newRecipe;
    saveRecipeEdits();
  } else {
    // brand new recipe, owned by this account
    var doc = {
      name:name, tags:tags, kidFriendly:kidFriendly, kidNote:kidNote||"",
      time:time, servings:servings, ingredients:ingredients, steps:steps,
      ownerId: state.currentUser.uid, ownerName: state.currentUser.displayName || state.currentUser.email,
      isPublic:false, createdAt:new Date().toISOString()
    };
    try{ await db.collection("recipes").add(doc); }
    catch(e){ console.error("Couldn't save recipe:", e); }
  }
  state.formState = null;
  state.modalRecipe = null;
  state.importDraft = null;
  state.tab = "recipes";
  render();
}

async function removeRecipeFromCookbook(id){
  if (isOwnedRecipe(id)){
    try{ await db.collection("recipes").doc(id).delete(); }
    catch(e){ console.error("Couldn't remove recipe:", e); }
  } else {
    if (state.hiddenIds.indexOf(id)===-1) state.hiddenIds.push(id);
    saveHiddenIds();
  }
  state.week = state.week.filter(function(w){ return w.id!==id; });
  saveWeek();
  state.modalRecipe = null;
  state.formState = null;
  render();
}
function restoreHidden(){
  state.hiddenIds = [];
  saveHiddenIds();
  render();
}

/* =========================================================
   SHOPPING LIST BUILD
   ========================================================= */
function buildShoppingMap(){
  var map = {};
  state.week.forEach(function(entry){
    var r = findRecipe(entry.id);
    if (!r) return;
    var mult = entry.batches||1;
    r.ingredients.forEach(function(ing){
      var key = ing.name.toLowerCase()+"|"+(ing.unit||"").toLowerCase();
      if (!map[key]) map[key] = {name:ing.name, unit:ing.unit, amount:0, category:ing.category||"Other", toTaste:false};
      if (ing.amount===null||ing.amount===undefined){ map[key].toTaste = true; }
      else { map[key].amount += ing.amount*mult; }
    });
  });
  return map;
}

/* =========================================================
   RENDER
   ========================================================= */
function render(){
  var app = document.getElementById("app");
  if (!state.currentUser){
    app.innerHTML = renderAuthGate();
    attachFormHandler();
    return;
  }
  var html = "";
  html += renderHero();
  html += '<div class="wrap">';
  html += renderTabs();
  if (state.showMigrationBanner) html += renderMigrationBanner();
  if (state.tab==="recipes") html += renderRecipesTab();
  if (state.tab==="week") html += renderWeekTab();
  if (state.tab==="shopping") html += renderShoppingTab();
  if (state.tab==="staples") html += renderStaplesTab();
  if (state.tab==="community") html += renderCommunityTab();
  html += '</div>';
  if (state.formState){
    html += renderRecipeFormModal();
  } else if (state.importMode){
    html += renderImportModal();
  } else if (state.modalRecipe){
    html += renderRecipeModal(findRecipe(state.modalRecipe));
  }
  app.innerHTML = html;
  attachFormHandler();
}

function renderTabs(){

  var TABS = [
    {key:"recipes",  icon:"📖", label:"Recipes",  count:allRecipes().length},
    {key:"week",     icon:"📅", label:"This Week", count:wc},

    {key:"staples",  icon:"📌", label:"Staples",   count:state.staples.length},
    {key:"community",icon:"🌐", label:"Community", count:state.publicRecipes.length}

      '<label>Sharing</label>'+

      '<label for="pub-'+r.id+'" style="margin:0;">'+(r.isPublic?"Public — shown in everyone's Community tab (uncheck to unshare)":"Make public (shows up in everyone's Community tab)")+'</label>'+
      '</div>'+
      '<div style="display:flex;gap:8px;align-items:center;">'+
      '<button type="button" class="btn secondary" onclick="copyShareLink(\''+r.id+'\')">Copy share link</button>'+

  } else if (isStarter){

      '</div>'+
      '<div style="display:flex;gap:8px;align-items:center;">'+
      '<button type="button" class="btn secondary" onclick="shareStarterLink(\''+r.id+'\')">Copy share link</button>'+
      '<span id="share-link-status-'+r.id+'" style="font-size:12.5px;color:var(--ink-soft);"></span>'+
      '</div>'+
      '<div style="font-size:12px;color:var(--ink-soft);margin-top:6px;">Sharing a built-in recipe creates a copy friends can fetch by link — it won\'t change anything in your own cookbook.</div>'+
      '</div>';
  }

  html += '<div class="modal-actions">';
  if (owned){
    html += '<button class="btn" onclick="toggleWeek(\''+r.id+'\')">'+(added?"✓ On this week's list":"+ Add to this week")+'</button>'+
      '<button class="btn secondary" onclick="openEditForm(\''+r.id+'\')">Edit recipe</button>'+
      '<button class="btn danger" onclick="removeRecipeFromCookbook(\''+r.id+'\')">Remove from cookbook</button>';

    html += '<button class="btn" onclick="toggleWeek(\''+r.id+'\')">'+(added?"✓ On this week's list":"+ Add to this week")+'</button>'+

    html += '<button class="btn" onclick="saveCommunityCopy(\''+r.id+'\')">Save a copy to my cookbook</button>';

  html += '</div>';
  html += '</div></div></div></div>'; // modal-actions, modal-body, modal-scroll, modal, overlay

function renderWeekTab(){
  if (!state.week.length){
    return '<div class="empty"><span class="big">Nothing on the menu yet</span>Head to Recipes and tap "+ This week" on anything you\'re craving.</div>';
  }
  var html = '<div class="toolbar"><h4 style="margin:0;flex:1;font-family:\'Caveat\',cursive;font-size:26px;">This week\'s menu</h4>'+
    '<button class="btn danger" onclick="clearWeek()">Clear week</button></div>';
  state.week.forEach(function(entry){
    var r = findRecipe(entry.id);
    if (!r) return;
    html += '<div class="week-item">'+
      '<div><h4>'+escapeHtml(r.name)+'</h4><div class="meta">'+escapeHtml(r.time||"")+' &middot; serves '+((r.servings||4)*entry.batches)+'</div></div>'+
      '<div class="stepper">'+
      '<span style="font-size:12px;color:var(--ink-soft);font-weight:600;">Batches</span>'+
      '<button onclick="changeBatches(\''+r.id+'\',-1)">−</button><span>'+entry.batches+'</span><button onclick="changeBatches(\''+r.id+'\',1)">+</button>'+
      '</div>'+

}

function renderShoppingTab(){
  var map = buildShoppingMap();
  var keys = Object.keys(map);
  var hasStaples = state.staples.length>0;
  if (!keys.length && !hasStaples){
    return '<div class="empty"><span class="big">Your list is empty</span>Add some meals to "This Week", or add a few items in the Staples tab, and they\'ll land here organized by aisle.</div>';
  }
  var byCat = {};
  keys.forEach(function(k){
    var item = map[k];
    if (!byCat[item.category]) byCat[item.category]=[];
    byCat[item.category].push({key:k, item:item});
  });

  var totalItems = keys.length + state.staples.length;
  var html = '<div class="receipt"><div class="receipt-head"><h2>Grocery List</h2>'+
    '<p>'+state.week.length+' recipe'+(state.week.length===1?"":"s")+' &middot; '+totalItems+' items</p></div>';

  if (hasStaples){
    html += '<div class="cat-block"><div class="cat-title">Weekly Staples</div>';
    state.staples.forEach(function(s){
      var key = "staple:"+s.id;
      var checked = !!state.checks[key];
      html += '<label class="shop-item'+(checked?" checked":"")+'">'+
        '<input type="checkbox" '+(checked?"checked":"")+' onchange="toggleCheck(\''+key+'\')">'+
        '<span class="shop-amt">'+escapeHtml(s.note||"")+'</span><span>'+escapeHtml(s.name||"(unnamed item)")+'</span></label>';
    });
    html += '</div>';
  }

  CATEGORY_ORDER.forEach(function(cat){
    if (!byCat[cat]) return;
    var items = byCat[cat].sort(function(a,b){ return a.item.name.localeCompare(b.item.name); });
    html += '<div class="cat-block"><div class="cat-title">'+escapeHtml(cat)+'</div>';
    items.forEach(function(entry){
      var item = entry.item;
      var checked = !!state.checks[entry.key];
      var amtStr = item.toTaste && item.amount===0 ? (item.unit||"to taste") : formatAmount(item.amount)+" "+(item.unit||"");
      if (item.toTaste && item.amount>0) amtStr += " +";
      html += '<label class="shop-item'+(checked?" checked":"")+'">'+
        '<input type="checkbox" '+(checked?"checked":"")+' onchange="toggleCheck(\''+entry.key.replace(/'/g,"\\'")+'\')">'+
        '<span class="shop-amt">'+escapeHtml(amtStr)+'</span><span>'+escapeHtml(item.name)+'</span></label>';
    });
    html += '</div>';
  });

  html += '<div class="receipt-actions">'+
    '<button class="btn secondary" onclick="window.print()">Print list</button>'+
    '<button class="btn danger" onclick="clearChecks()">Reset checkmarks</button>'+
    '</div></div>';
  return html;
}

function renderStaplesTab(){
  var html = '<div class="toolbar"><h4 style="margin:0;flex:1;font-family:\'Caveat\',cursive;font-size:26px;">Weekly staples</h4>'+
    '<button class="btn" onclick="addStapleRow()">+ Add staple</button></div>';
  html += '<p style="color:var(--ink-soft);font-size:13.5px;margin-top:-8px;margin-bottom:18px;">These land on every shopping list automatically — the everyday basics you never want to forget.</p>';

function setupRowDrag(containerId){
  var container = document.getElementById(containerId);
  if (!container) return;
  // Remove any old listeners by cloning the node
  var fresh = container.cloneNode(true);
  container.parentNode.replaceChild(fresh, container);
  container = fresh;

  var dragging = null;
  var placeholder = null;

  function liveRows(){
    return Array.from(container.children).filter(function(el){
      return (el.classList.contains("ing-row")||el.classList.contains("step-row")) && el!==placeholder;
    });
  }

  container.addEventListener("pointerdown", function(e){
    var handle = e.target.closest(".drag-handle");
    if (!handle) return;
    var row = handle.closest(".ing-row,.step-row");
    if (!row || !container.contains(row)) return;
    e.preventDefault();
    dragging = row;
    dragging.classList.add("dragging");
    placeholder = document.createElement("div");
    placeholder.className = "drop-placeholder";
    container.insertBefore(placeholder, dragging);
    handle.setPointerCapture(e.pointerId);
  },{passive:false});

  container.addEventListener("pointermove", function(e){
    if (!dragging || !placeholder) return;
    e.preventDefault();
    var rows = liveRows();
    var y = e.clientY;
    var insertBefore = null;
    for (var i=0;i<rows.length;i++){
      var rect = rows[i].getBoundingClientRect();
      if (y < rect.top + rect.height*0.5){ insertBefore=rows[i]; break; }
    }
    if (insertBefore){
      if (placeholder.nextSibling!==insertBefore) container.insertBefore(placeholder,insertBefore);
    } else {
      if (container.lastChild!==placeholder) container.appendChild(placeholder);
    }
  },{passive:false});

  function endDrag(){
    if (!dragging) return;
    dragging.classList.remove("dragging");
    if (placeholder && placeholder.parentNode){
      placeholder.parentNode.insertBefore(dragging, placeholder);
      placeholder.remove();
    }
    dragging=null; placeholder=null;
  }
  container.addEventListener("pointerup", endDrag);
  container.addEventListener("pointercancel", endDrag);
}

function attachFormHandler(){
  var f = document.getElementById("recipe-form");
  if (f){
    f.addEventListener("submit", submitRecipeForm);
    setupRowDrag("ing-rows");
    setupRowDrag("step-rows");
  }
  var af = document.getElementById("auth-form");
  if (af) af.addEventListener("submit", submitAuthForm);
}
